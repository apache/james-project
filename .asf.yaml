github:
  description: "Emails at the heart of your business logic!"
  homepage: https://james.apache.org/
  labels:
    - mail
    - server
    - imap
    - smtp
    - jmap

  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
notifications:
  commits: notifications@james.apache.org
  issues: notifications@james.apache.org
  pullrequests: notifications@james.apache.org
  jira_options: link label worklog
